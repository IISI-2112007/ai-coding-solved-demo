name: 本地 AI 到 Cloud Agent 模擬任務
description: 交給 GitHub Actions 模擬的 cloud agent，產生一個可審查的小成果。
title: "[agent-task] "
labels:
  - local-ai
  - cloud-agent:ready
body:
  - type: markdown
    attributes:
      value: |
        這個 template 用於第一階段 simulator：本地端 AI 先把任務整理成 Issue，再由 GitHub Actions 模擬 cloud agent 開 PR。
        請把任務切小，讓人類 reviewer 可以直接檢查 PR diff。
  - type: textarea
    id: goal
    attributes:
      label: 目標
      description: 希望 cloud agent 產生什麼成果？
      placeholder: 建立一份短報告，說明這次任務交接與產出證據。
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: 背景
      description: Agent 需要知道哪些脈絡？
      placeholder: 這個 repo 用來展示本地端 AI 到 cloud agent，再到人類審查的流程。
    validations:
      required: true
  - type: textarea
    id: allowed_scope
    attributes:
      label: 允許修改範圍
      description: Agent 可以修改哪些檔案或資料夾？
      placeholder: cloud-agent-output/** and DEMO_RESULTS.md
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: 驗收標準
      description: 人類 reviewer 要用哪些證據判斷任務完成？
      placeholder: |
        - 已建立 Pull Request。
        - PR 有連回這個 issue。
        - 產出內容容易審查。
    validations:
      required: true
  - type: checkboxes
    id: handoff
    attributes:
      label: 交接確認
      options:
        - label: 這個任務足夠小，可以用 demo PR 審查。
          required: true
        - label: cloud agent 可以開 PR 交給人類審查。
          required: true
